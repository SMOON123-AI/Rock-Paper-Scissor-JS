<!DOCTYPE html>
<html>
  <head>
    <title>Rock Paper Scissors DOM</title>

    <link rel="stylesheet" href="style.css">
  
  </head>
  <body>
    <p class="title">Rock Paper Scissors</p>
    <button class="emoji-r emoji">
      <img src="images/rock-emoji.png" class="move-icon">
    </button>

    <button class="emoji-p emoji">  
      <img src="images/paper-emoji.png" class="move-icon">  
    </button>

    <button class="emoji-s emoji">
      <img src="images/scissors-emoji.png" class="move-icon">
    </button>

    <p class="js-final-result fin-result"></p>

    <p class="js-result result"></p>

    <p class="js-score score"></p>

    <button class="reset-score-button">Reset Score</button>

    <button class="auto-play">AutoPlay</button>

    <script src="script.js"></script>
  
  </body>
</html>
